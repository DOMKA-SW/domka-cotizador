<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DOMKA — Mis Proyectos</title>
  <link rel="icon" href="../img/favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root{--bg:#f4efe7;--white:#ffffff;--green:#1b7a51;--green-lt:#e8f5ee;--text:#2c2c2c;--gray:#5a5a5a;--gray-lt:#9a9a9a;--line:#d6cfc5}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);min-height:100vh}
    h1,h2,h3{font-family:'DM Serif Display',serif;font-weight:400}
    a{text-decoration:none;color:inherit}
    button{cursor:pointer;border:none;font-family:'DM Sans',sans-serif}

    .portal-header{background:var(--white);border-bottom:1px solid var(--line);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .portal-logo{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--green)}
    .nav-back{font-size:.85rem;color:var(--green);font-weight:600;display:flex;align-items:center;gap:6px}
    .main{max-width:900px;margin:0 auto;padding:40px 24px 80px}
    .page-title{margin-bottom:28px}
    .page-title h1{font-size:1.8rem;color:var(--text);margin-bottom:4px}
    .page-title p{color:var(--gray-lt);font-size:.88rem}

    .proy-card{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:24px;margin-bottom:20px}
    .proy-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
    .proy-num{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--text)}
    .badge{display:inline-block;font-size:.72rem;font-weight:600;padding:4px 10px;border-radius:999px;margin-top:6px}
    .badge-pendiente{background:#fef9c3;color:#854d0e}
    .badge-en_ejecucion{background:#dbeafe;color:#1e40af}
    .badge-finalizado{background:#dcfce7;color:#166534}
    .badge-suspendido{background:#fee2e2;color:#991b1b}

    .evidence-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:14px}
    .ev-img{width:100%;height:90px;object-fit:cover;border-radius:8px;cursor:pointer;transition:opacity .2s}
    .ev-img:hover{opacity:.85}
    .ev-fecha{font-size:.7rem;color:var(--gray-lt);margin-top:4px;text-align:center}

    #lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:600;display:flex;align-items:center;justify-content:center;cursor:pointer}
    #lightbox img{max-width:90vw;max-height:90vh;border-radius:8px}
    .empty{text-align:center;padding:80px 20px;color:var(--gray-lt)}
    .empty i{font-size:2.5rem;color:var(--line);display:block;margin-bottom:16px}
    .spinner{text-align:center;padding:60px;color:var(--gray-lt)}
    .section-mini{font-size:.65rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--green);margin-bottom:10px;display:block}
  </style>
</head>
<body>

<header class="portal-header">
  <span class="portal-logo">DOMKA</span>
  <a href="index.html" class="nav-back"><i class="fas fa-arrow-left"></i> Portal</a>
</header>

<div class="main">
  <div class="page-title">
    <h1>Mis proyectos</h1>
    <p>Sigue el avance de tus obras y revisa las evidencias</p>
  </div>

  <div id="lista-proyectos">
    <div class="spinner"><i class="fas fa-circle-notch fa-spin"></i></div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" style="display:none" onclick="this.style.display='none'">
  <img id="lb-img" src="" alt="">
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="../js/firebase.js"></script>
<script src="../js/security.js"></script>
<script src="../js/roles.js"></script>
<script src="../js/auth.js"></script>
<script>
  const badgeLabel = {pendiente:'Pendiente',en_ejecucion:'En ejecución',finalizado:'Finalizado',suspendido:'Suspendido'};

  const unsub = window.auth.onAuthStateChanged(async (user) => {
    if (!user) return;
    unsub();
    const perfil = await cargarPerfil(user);
    const clienteId = perfil?.clienteId;
    if (!clienteId) {
      document.getElementById('lista-proyectos').innerHTML =
        '<div class="empty"><i class="fas fa-exclamation-circle"></i><p>Cuenta no vinculada. Contacta a DOMKA.</p></div>';
      return;
    }
    try {
      const snap = await db.collection('proyectos')
        .where('clienteId','==',clienteId)
        .orderBy('creadoEn','desc').get();
      const proyectos = snap.docs.map(d=>({id:d.id,...d.data()}));
      renderProyectos(proyectos);
    } catch(e) {
      document.getElementById('lista-proyectos').innerHTML =
        '<div class="empty"><i class="fas fa-exclamation-triangle"></i><p>Error cargando proyectos.</p></div>';
    }
  });

  function renderProyectos(list) {
    const c = document.getElementById('lista-proyectos');
    if (!list.length) {
      c.innerHTML = '<div class="empty"><i class="fas fa-hard-hat"></i><p>Aún no tienes proyectos registrados.</p></div>';
      return;
    }
    c.innerHTML = list.map(p => {
      const evs = (p.evidencias||[]).filter(e=>(e.tipo||'').startsWith('image/'));
      const badgeCls = 'badge-'+(p.estado||'pendiente');
      const fecha = p.creadoEn?.toDate ? p.creadoEn.toDate().toLocaleDateString('es-CO') : '—';
      return `
      <div class="proy-card">
        <div class="proy-header">
          <div>
            <div class="proy-num">${esc(p.numero||'Proyecto')}</div>
            <div style="font-size:.82rem;color:var(--gray-lt);margin-top:2px">${fecha}</div>
            <span class="badge ${badgeCls}">${badgeLabel[p.estado]||p.estado}</span>
          </div>
        </div>
        ${p.descripcion ? `<p style="font-size:.88rem;color:var(--gray);margin-bottom:14px">${esc(p.descripcion)}</p>` : ''}
        ${evs.length ? `
          <span class="section-mini">Evidencias (${evs.length})</span>
          <div class="evidence-grid">
            ${evs.map(ev=>`
              <div>
                <img class="ev-img" src="${ev.base64}" alt="${esc(ev.nombre||'')}"
                  onclick="document.getElementById('lb-img').src=this.src;document.getElementById('lightbox').style.display='flex'">
                <div class="ev-fecha">${ev.fecha?new Date(ev.fecha).toLocaleDateString('es-CO'):'—'}</div>
              </div>`).join('')}
          </div>
        ` : '<p style="font-size:.85rem;color:var(--gray-lt);margin-top:8px">Sin evidencias aún.</p>'}
      </div>`;
    }).join('');
  }

  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
</script>
</body>
</html>
